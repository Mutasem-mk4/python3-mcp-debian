name: Weekly Lockfile Update

on:
  workflow_dispatch:
  schedule:
    # Every Thursday at 8:00 UTC
    - cron: "0 8 * * 4"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: 0.9.5

      - name: Update lockfile
        run: |
          echo '## Updated Dependencies' > pr_body.md
          echo '' >> pr_body.md
          echo '```' >> pr_body.md
          uv lock --upgrade 2>&1 | tee -a pr_body.md
          echo '```' >> pr_body.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          commit-message: "chore: update uv.lock with latest dependencies"
          title: "chore: weekly dependency update"
          body-path: pr_body.md
          branch: weekly-lockfile-update-v1x
          delete-branch: true
          add-paths: uv.lock
          labels: dependencies
