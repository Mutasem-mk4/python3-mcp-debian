name: Debian Packaging

on:
  push:
    branches:
      - main
      - debian/packaging
  pull_request:
    branches:
      - main

jobs:
  patched-python-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip and install build frontend
        run: python -m pip install --upgrade pip build

      - name: Apply Debian static-version patch
        run: git apply debian/patches/0001-use-static-version-for-debian-builds.patch

      - name: Build patched source tree
        run: python -m build

  debian-metadata-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-hatchling

      - name: Validate required Debian packaging files
        run: |
          test -f debian/control
          test -f debian/changelog
          test -f debian/rules
          test -f debian/copyright
          test -f debian/watch
          test -f debian/tests/control
          test -f debian/patches/0001-use-static-version-for-debian-builds.patch

  debian-validation:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Debian packaging toolchain and dependencies
        run: |
          apt-get update
          apt-get install -y \
            autopkgtest \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            git \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-anyio \
            python3-hatchling \
            python3-httpx \
            python3-httpx-sse \
            python3-jsonschema \
            python3-jwt \
            python3-multipart \
            python3-pydantic \
            python3-pydantic-settings \
            python3-sse-starlette \
            python3-starlette \
            python3-typer \
            python3-typing-extensions \
            python3-typing-inspection \
            python3-uvicorn \
            python3-websockets

      - name: Create upstream orig tarball
        run: |
          version="$(dpkg-parsechangelog -SVersion | sed 's/-.*//')"
          tar \
            --exclude-vcs \
            --transform "s,^\./,python-mcp-${version}/," \
            -czf "../python-mcp_${version}.orig.tar.gz" \
            .

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc

      - name: Run lintian
        run: lintian ../python-mcp_1.27.0-1_*.changes

      - name: Run autopkgtest
        run: autopkgtest ../python-mcp_1.27.0-1_amd64.changes -- null
